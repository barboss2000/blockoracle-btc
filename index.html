<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>BlockOracle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b0f1a;
  color: white;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: #0e1322;
}

.logo {
  font-weight: bold;
  font-size: 20px;
}

.network {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 14px;
  margin-right: 10px;
}

.testnet { background: #16a34a; }
.mainnet { background: #444; opacity: 0.6; }

.wallet-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f7931a;
  color: black;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.wallet-btn img {
  height: 18px;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

select, input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  margin: 10px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}

.yes { background: #16a34a; color: white; }
.no { background: #dc2626; color: white; }

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 16px;
  margin-top: 30px;
}

.countdown {
  margin-top: 10px;
  font-size: 18px;
  color: #f7931a;
}

footer {
  margin-top: 60px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🔮 BlockOracle</div>

  <div style="display:flex;align-items:center;">
    <div class="network testnet">Testnet</div>
    <div class="network mainnet">Mainnet (Soon)</div>

    <div class="wallet-btn" onclick="connectWallet()">
      <img src="https://i.imgur.com/7yUvePI.png" alt="OP Wallet"/>
      <span id="walletText">Connect OP_WALLET</span>
    </div>
  </div>
</div>

<div class="container">

<h2>Select Asset</h2>

<select id="coinSelect" onchange="changeCoin()">
  <option value="BINANCE:BTCUSDT">Bitcoin (BTC)</option>
  <option value="BINANCE:ETHUSDT">Ethereum (ETH)</option>
  <option value="BINANCE:BNBUSDT">BNB</option>
  <option value="BINANCE:SOLUSDT">Solana (SOL)</option>
  <option value="BINANCE:XRPUSDT">XRP</option>
  <option value="BINANCE:ADAUSDT">Cardano (ADA)</option>
  <option value="BINANCE:AVAXUSDT">Avalanche (AVAX)</option>
  <option value="BINANCE:DOGEUSDT">Dogecoin (DOGE)</option>
  <option value="BINANCE:TRXUSDT">TRON (TRX)</option>
  <option value="BINANCE:DOTUSDT">Polkadot (DOT)</option>
</select>

<div id="tv_chart" style="height:400px;margin-top:20px;"></div>

<div class="card">

<h2>Select Duration</h2>

<button onclick="selectTime(60)">1m</button>
<button onclick="selectTime(120)">2m</button>
<button onclick="selectTime(180)">3m</button>
<button onclick="selectTime(240)">4m</button>
<button onclick="selectTime(300)">5m</button>

<div class="countdown" id="countdown">No active round</div>

<h2 style="margin-top:25px;">Bet Amount ($PILL)</h2>
<input type="number" id="betAmount" placeholder="100 $PILL" />

<div>
  <button class="yes" onclick="placeBet('UP')">BET UP</button>
  <button class="no" onclick="placeBet('DOWN')">BET DOWN</button>
</div>

</div>

<footer>
OP_WALLET integration coming soon — Demo UI only
</footer>

</div>

<script>

let currentSymbol = "BINANCE:BTCUSDT";
let timer;
let timeLeft = 0;
let connected = false;

function loadChart(symbol) {
  document.getElementById("tv_chart").innerHTML = "";
  new TradingView.widget({
    container_id: "tv_chart",
    width: "100%",
    height: 400,
    symbol: symbol,
    interval: "1",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en"
  });
}

function changeCoin() {
  const select = document.getElementById("coinSelect");
  currentSymbol = select.value;
  loadChart(currentSymbol);
}

function selectTime(seconds) {
  clearInterval(timer);
  timeLeft = seconds;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("countdown").innerText =
      "Round ends in: " + timeLeft + "s";

    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById("countdown").innerText =
        "Round finished. Awaiting result...";
    }
  }, 1000);
}

function connectWallet() {
  if (!connected) {
    connected = true;
    document.getElementById("walletText").innerText = "Connected";
  }
}

function placeBet(direction) {
  if (!connected) {
    alert("Connect OP_WALLET first");
    return;
  }

  const amount = document.getElementById("betAmount").value;

  if (!amount) {
    alert("Enter bet amount in $PILL");
    return;
  }

  alert(
    "Asset: " + currentSymbol +
    "\nDirection: " + direction +
    "\nAmount: " + amount + " $PILL"
  );
}

loadChart(currentSymbol);

</script>

</body>
</html>
