<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>BlockOracle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b0f1a;
  color: white;
}

/* ===== TOP BAR ===== */

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 30px;
  background: #0e1322;
}

.network {
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-right: 10px;
}

.testnet { background: #16a34a; }
.mainnet { background: #444; opacity: 0.6; }

.wallet-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f7931a;
  color: black;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.wallet-btn:hover {
  transform: scale(1.05);
}

/* ===== MAIN ===== */

.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

.hero-logo {
  margin: 30px 0;
}

.hero-logo svg {
  filter: drop-shadow(0 0 20px rgba(247,147,26,0.6));
}

select, input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  margin: 10px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}

.timer-btn {
  background: #1f2937;
  color: white;
}

.timer-btn.active {
  background: #f7931a;
  color: black;
}

.yes { background: #16a34a; color: white; }
.no { background: #dc2626; color: white; }

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 16px;
  margin-top: 30px;
}

.countdown {
  margin-top: 10px;
  font-size: 18px;
  color: #f7931a;
}

footer {
  margin-top: 60px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="topbar">
  <div>🔮 BlockOracle</div>

  <div style="display:flex;align-items:center;">

    <div class="network testnet">Testnet</div>
    <div class="network mainnet">Mainnet (Soon)</div>

    <div class="wallet-btn" onclick="connectWallet()">
      <!-- Clean wallet icon -->
      <svg width="20" height="20" viewBox="0 0 24 24">
        <rect x="2" y="6" width="20" height="12" rx="3" fill="black"/>
        <circle cx="16" cy="12" r="2" fill="#f7931a"/>
      </svg>
      <span id="walletText">Connect OP_WALLET</span>
    </div>

  </div>
</div>

<div class="container">

<h1>Predict Short-Term Moves</h1>

<!-- Bitcoin Logo -->
<div class="hero-logo">
  <svg width="120" height="120" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="16" fill="#f7931a"/>
    <text x="16" y="21" text-anchor="middle" font-size="16"
          fill="white" font-family="Arial" font-weight="bold">₿</text>
  </svg>
</div>

<p>Built on Bitcoin L1 — Bet with $PILL</p>

<h2>Select Asset</h2>

<select id="coinSelect" onchange="changeCoin()">
  <option value="BINANCE:BTCUSDT">Bitcoin (BTC)</option>
  <option value="BINANCE:ETHUSDT">Ethereum (ETH)</option>
  <option value="BINANCE:BNBUSDT">BNB</option>
  <option value="BINANCE:SOLUSDT">Solana (SOL)</option>
  <option value="BINANCE:XRPUSDT">XRP</option>
  <option value="BINANCE:ADAUSDT">Cardano (ADA)</option>
  <option value="BINANCE:AVAXUSDT">Avalanche (AVAX)</option>
  <option value="BINANCE:DOGEUSDT">Dogecoin (DOGE)</option>
  <option value="BINANCE:TRXUSDT">TRON (TRX)</option>
  <option value="BINANCE:DOTUSDT">Polkadot (DOT)</option>
</select>

<div id="tv_chart" style="height:400px;margin-top:20px;"></div>

<div class="card">

<h2>Select Duration</h2>

<button class="timer-btn" onclick="selectTime(60,this)">1m</button>
<button class="timer-btn" onclick="selectTime(120,this)">2m</button>
<button class="timer-btn" onclick="selectTime(180,this)">3m</button>
<button class="timer-btn" onclick="selectTime(240,this)">4m</button>
<button class="timer-btn" onclick="selectTime(300,this)">5m</button>

<div class="countdown" id="countdown">No active round</div>

<h2 style="margin-top:25px;">Bet Amount ($PILL)</h2>
<input type="number" id="betAmount" placeholder="100 $PILL" />

<div>
  <button class="yes" onclick="placeBet('UP')">BET UP</button>
  <button class="no" onclick="placeBet('DOWN')">BET DOWN</button>
</div>

</div>

<footer>
OP_WALLET integration coming soon — Demo UI
</footer>

</div>

<script>

let currentSymbol = "BINANCE:BTCUSDT";
let timer;
let timeLeft = 0;
let connected = false;

function loadChart(symbol) {
  document.getElementById("tv_chart").innerHTML = "";
  new TradingView.widget({
    container_id: "tv_chart",
    width: "100%",
    height: 400,
    symbol: symbol,
    interval: "1",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en"
  });
}

function changeCoin() {
  currentSymbol = document.getElementById("coinSelect").value;
  loadChart(currentSymbol);
}

function selectTime(seconds, btn) {
  clearInterval(timer);

  document.querySelectorAll(".timer-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  timeLeft = seconds;
  document.getElementById("countdown").innerText = "Round ends in: " + timeLeft + "s";

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("countdown").innerText =
      "Round ends in: " + timeLeft + "s";

    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById("countdown").innerText =
        "Round finished. Awaiting result...";
    }
  }, 1000);
}

function connectWallet() {
  if (!connected) {
    connected = true;
    document.getElementById("walletText").innerText = "Connected ✓";
  }
}

function placeBet(direction) {

  if (!connected) {
    alert("Connect OP_WALLET first");
    return;
  }

  const amount = document.getElementById("betAmount").value;

  if (!amount) {
    alert("Enter bet amount in $PILL");
    return;
  }

  alert(
    "Asset: " + currentSymbol +
    "\nDirection: " + direction +
    "\nAmount: " + amount + " $PILL"
  );
}

loadChart(currentSymbol);

</script>

</body>
</html>
