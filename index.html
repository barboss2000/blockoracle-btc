<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BlockOracle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      max-width: 600px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      opacity: 0.8;
    }
    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: #f7931a;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🔮 BlockOracle</h1>
    <p>
      A decentralized prediction game built on Bitcoin L1 using DLCs and Taproot.
    </p>
    <p>
      Bet in sats. No custodians. Only Bitcoin.
    </p>
    <a class="btn" href="https://github.com/barboss2000/blockoracle-btc">
      View on GitHub
    </a>
  </div>
</body>
</html>
