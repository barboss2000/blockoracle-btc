<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>BlockOracle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      margin-top: 30px;
    }

    .timers button {
      margin: 5px;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      cursor: pointer;
    }

    .timers button.active {
      background: #f7931a;
      color: black;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
      margin-top: 15px;
      text-align: center;
      font-size: 16px;
    }

    .bet-buttons button {
      margin: 10px;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .yes {
      background: #16a34a;
      color: white;
    }

    .no {
      background: #dc2626;
      color: white;
    }

    .countdown {
      margin-top: 15px;
      font-size: 18px;
      color: #f7931a;
    }

    footer {
      margin-top: 60px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>🔮 BlockOracle</h1>
  <div class="subtitle">
    Predict BTC price moves in 1–5 minutes using $PILL tokens
  </div>

  <!-- TradingView Chart -->
  <div id="tv_chart" style="height:400px;"></div>

  <div class="card">

    <h2>Select Duration</h2>

    <div class="timers">
      <button onclick="selectTime(60)">1m</button>
      <button onclick="selectTime(120)">2m</button>
      <button onclick="selectTime(180)">3m</button>
      <button onclick="selectTime(240)">4m</button>
      <button onclick="selectTime(300)">5m</button>
    </div>

    <div class="countdown" id="countdown">No active round</div>

    <h2 style="margin-top:30px;">Enter Bet Amount ($PILL)</h2>
    <input type="number" id="betAmount" placeholder="100 $PILL" />

    <div class="bet-buttons">
      <button class="yes" onclick="placeBet('UP')">BET UP</button>
      <button class="no" onclick="placeBet('DOWN')">BET DOWN</button>
    </div>

  </div>

  <footer>
    Demo UI — Settlement logic coming soon
  </footer>

</div>

<script>
  new TradingView.widget({
    container_id: "tv_chart",
    width: "100%",
    height: 400,
    symbol: "BINANCE:BTCUSDT",
    interval: "1",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    toolbar_bg: "#0b0f1a",
    enable_publishing: false,
    hide_top_toolbar: false,
    save_image: false
  });

  let timer;
  let timeLeft = 0;

  function selectTime(seconds) {
    clearInterval(timer);
    timeLeft = seconds;
    document.getElementById("countdown").innerText =
      "Round ends in: " + timeLeft + "s";

    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("countdown").innerText =
        "Round ends in: " + timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerText =
          "Round finished. Awaiting result...";
      }
    }, 1000);
  }

  function placeBet(direction) {
    const amount = document.getElementById("betAmount").value;
    if (!amount) {
      alert("Enter bet amount in $PILL");
      return;
    }

    alert("Bet placed: " + amount + " $PILL | Direction: " + direction);
  }
</script>

</body>
</html>
