<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BlockBet — Bitcoin Testnet</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:'DM Mono',monospace;
}

.header{
display:flex;
justify-content:space-between;
padding:12px 20px;
border-bottom:1px solid #222;
}

.logo{
font-family:'Syne',sans-serif;
font-size:20px;
font-weight:800;
}

.logo span{color:#f7931a;}

.connect{
background:#f7931a;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.layout{
display:grid;
grid-template-columns:1fr 420px;
height:calc(100vh - 50px);
}

.chart{
border-right:1px solid #222;
}

#tv_chart{
height:100%;
}

.panel{
padding:20px;
overflow:auto;
}

.card{
background:#141414;
border:1px solid #222;
border-radius:10px;
padding:16px;
margin-bottom:14px;
}

.label{
font-size:11px;
color:#777;
text-transform:uppercase;
}

.value{
font-size:16px;
margin-top:3px;
}

.pool{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:12px;
}

.bar{
height:8px;
background:#3a1f1f;
border-radius:5px;
margin-top:6px;
overflow:hidden;
}

.barfill{
height:100%;
background:#4ade80;
width:50%;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
background:#111;
color:white;
font-size:16px;
}

.buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

button{
padding:14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.even{
background:#4ade80;
}

.odd{
background:#f87171;
}

.action{
width:100%;
margin-top:10px;
background:#222;
color:white;
}

.history{
font-size:12px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">BLOCK<span>BET</span></div>
<button class="connect" onclick="connect()">Connect Wallet</button>
</div>

<div class="layout">

<div class="chart">
<div id="tv_chart"></div>
</div>

<div class="panel">

<div class="card">

<div class="label">Round</div>
<div class="value" id="round">-</div>

<div class="label">Target Block</div>
<div class="value" id="target">-</div>

<div class="label">Current Block</div>
<div class="value" id="block">-</div>

<div class="pool">
<div>EVEN <span id="evenPool">0</span></div>
<div id="prob">50%</div>
<div><span id="oddPool">0</span> ODD</div>
</div>

<div class="bar">
<div class="barfill" id="bar"></div>
</div>

</div>

<div class="card">

<input id="amount" type="number" placeholder="Bet (sats)" min="10000"/>

<div class="buttons">
<button class="even" onclick="bet(true)">EVEN</button>
<button class="odd" onclick="bet(false)">ODD</button>
</div>

<button class="action" onclick="settle()">Settle Round</button>
<button class="action" onclick="claim()">Claim</button>
<button class="action" onclick="withdraw()">Withdraw</button>

</div>

<div class="card">
<div class="label">History</div>
<div id="history" class="history"></div>
</div>

</div>
</div>

<script>

const CONTRACT="opr1sqqrgl4fwkxgtgdjg96t49wwwekl2fz6gacrgnall"

const RPC="https://testnet.opnet.org/api/v1/json-rpc"

const MEMPOOL="https://mempool.space/testnet/api"

const AVG_BLOCK=600

let account=null
let round=null
let chain=null

async function rpc(method,params){

const r=await fetch(RPC,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
jsonrpc:"2.0",
method,
params,
id:1
})
})

return r.json()

}

async function read(sig){

const data=await rpc("btc_call",[CONTRACT,sig])
return data.result

}

async function connect(){

if(!window.opnet){

alert("Install OPWallet")

return

}

const acc=await window.opnet.requestAccounts()

account=acc[0]

alert("Connected "+account)

}

async function bet(side){

if(!account)return alert("connect")

const amount=parseInt(document.getElementById("amount").value)

if(amount<10000)return alert("min 10000")

await window.opnet.signAndBroadcastInteraction({
to:CONTRACT,
calldata:"bet",
value:amount
})

}

async function settle(){

await window.opnet.signAndBroadcastInteraction({
to:CONTRACT,
calldata:"settle"
})

}

async function claim(){

await window.opnet.signAndBroadcastInteraction({
to:CONTRACT,
calldata:"claim"
})

}

async function withdraw(){

await window.opnet.signAndBroadcastInteraction({
to:CONTRACT,
calldata:"withdraw"
})

}

async function loadRound(){

try{

const r=await read("getRoundInfo")

document.getElementById("round").innerText=r.roundId

document.getElementById("target").innerText=r.targetBlock

document.getElementById("evenPool").innerText=r.evenPool

document.getElementById("oddPool").innerText=r.oddPool

const total=r.evenPool+r.oddPool

const p=total?((r.evenPool/total)*100).toFixed(1):50

document.getElementById("prob").innerText=p+"%"

document.getElementById("bar").style.width=p+"%"

round=r

}catch(e){}

}

async function loadBlock(){

try{

const r=await fetch(MEMPOOL+"/blocks/tip/height")

const h=await r.text()

document.getElementById("block").innerText=h

chain=parseInt(h)

}catch(e){}

}

async function checkWinner(){

if(!round)return

if(!round.winningBlock)return

const r=await fetch(MEMPOOL+"/block/"+round.winningBlock)

const b=await r.json()

const hash=b.id

const last=hash.slice(-1)

const even=parseInt(last,16)%2==0

addHistory(round.roundId,even)

}

let history=[]

function addHistory(id,even){

history.unshift({id,even})

history=history.slice(0,10)

document.getElementById("history").innerHTML=

history.map(h=>

`#${h.id} ${h.even?"EVEN":"ODD"}`
).join("<br>")

}

setInterval(loadRound,8000)

setInterval(loadBlock,15000)

loadRound()

loadBlock()

new TradingView.widget({
container_id:"tv_chart",
symbol:"BINANCE:BTCUSDT",
interval:"5",
theme:"dark",
width:"100%",
height:"100%"
})

</script>

</body>
</html>
