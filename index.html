<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>OP_NET & BlockOracle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://s3.tradingview.com/tv.js"></script>

<style>

/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#050816;
  color:white;
  overflow-x:hidden;
}

/* ===== CYBER GRAFFITI BACKGROUND ===== */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 30%, rgba(247,147,26,0.6), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,153,255,0.6), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,120,0,0.3), transparent 60%);
  z-index:-2;
}

body::after {
  content:"";
  position:fixed;
  inset:0;
  background-image:
    repeating-linear-gradient(
      120deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 8px
    );
  animation:moveBg 25s linear infinite;
  z-index:-1;
}

@keyframes moveBg {
  from { transform:translateX(0px); }
  to { transform:translateX(200px); }
}

/* ===== TOPBAR ===== */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(10,14,30,0.8);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.brand {
  font-weight:bold;
  font-size:18px;
}

.wallet-btn {
  background:#f7931a;
  color:black;
  padding:8px 16px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 15px rgba(247,147,26,0.7);
  transition:0.3s;
}

.wallet-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 0 25px rgba(247,147,26,1);
}

/* ===== HERO ===== */
.hero {
  padding:60px 20px 30px;
  text-align:center;
}

.hero img {
  height:200px;
  margin-bottom:20px;
  filter:
    drop-shadow(0 0 40px rgba(247,147,26,1))
    drop-shadow(0 0 80px rgba(0,153,255,0.7));
  animation:pulse 3s ease-in-out infinite alternate;
}

@keyframes pulse {
  from { transform:scale(1); }
  to { transform:scale(1.05); }
}

.hero h1 {
  font-size:38px;
}

.hero p {
  opacity:0.8;
}

/* ===== STATS ===== */
.stats {
  display:flex;
  justify-content:center;
  gap:40px;
  margin:30px 0;
  flex-wrap:wrap;
}

.stat-box {
  background:rgba(20,25,45,0.7);
  padding:15px 25px;
  border-radius:12px;
  backdrop-filter:blur(8px);
  box-shadow:0 0 15px rgba(0,153,255,0.2);
}

/* ===== MAIN ===== */
.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
  text-align:center;
}

.card {
  background:rgba(15,20,40,0.8);
  border:1px solid rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:16px;
  margin-top:25px;
  box-shadow:0 0 25px rgba(0,153,255,0.1);
}

select,input {
  padding:10px;
  border-radius:8px;
  border:none;
  font-size:16px;
  margin:10px;
}

button {
  padding:8px 14px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.timer-wrapper {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.timer-btn {
  background:#1f2937;
  color:white;
}

.timer-btn.active {
  background:#f7931a;
  color:black;
  box-shadow:0 0 20px rgba(247,147,26,1);
}

.yes {
  background:#16a34a;
  box-shadow:0 0 20px rgba(22,163,74,0.8);
}

.no {
  background:#dc2626;
  box-shadow:0 0 20px rgba(220,38,38,0.8);
}

footer {
  margin:50px 0;
  opacity:0.6;
  text-align:center;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="brand">OP_NET & BlockOracle</div>
  <div class="wallet-btn" onclick="connectWallet()" id="walletBtn">
    Connect OP_WALLET
  </div>
</div>

<div class="hero">
  <img src="blockoracle-logo.png" alt="Logo">
  <h1>Lightning Prediction Markets</h1>
  <p>Fast 1–5 minute price battles powered by $PILL</p>
</div>

<div class="stats">
  <div class="stat-box">Balance: <b id="balance">10000</b> $PILL</div>
  <div class="stat-box">Win Streak: <b id="streak">0</b></div>
  <div class="stat-box">Profit: <b id="profit">0</b></div>
</div>

<div class="container">

<select id="coinSelect" onchange="changeCoin()">
  <option value="BTCUSDT">BTC</option>
  <option value="ETHUSDT">ETH</option>
  <option value="BNBUSDT">BNB</option>
  <option value="SOLUSDT">SOL</option>
  <option value="XRPUSDT">XRP</option>
</select>

<div id="tv_chart" style="height:350px;margin-top:20px;"></div>

<div class="card">
<h3>Select Duration</h3>
<div class="timer-wrapper">
  <button class="timer-btn" onclick="selectTime(60,this)">1m</button>
  <button class="timer-btn" onclick="selectTime(120,this)">2m</button>
  <button class="timer-btn" onclick="selectTime(180,this)">3m</button>
  <button class="timer-btn" onclick="selectTime(240,this)">4m</button>
  <button class="timer-btn" onclick="selectTime(300,this)">5m</button>
</div>

<h3>Bet Amount ($PILL)</h3>
<input type="number" id="betAmount" placeholder="100">

<br>
<button class="yes" onclick="placeBet('UP')">UP</button>
<button class="no" onclick="placeBet('DOWN')">DOWN</button>

<div id="countdown"></div>
</div>

<div class="card">
<h3>AI Signal</h3>
<div id="aiSignal">Analyzing...</div>
</div>

<div class="card">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<footer>
© 2026 OP_NET & BlockOracle
</footer>

</div>

<script>

let connected=false;
let balance=10000;
let streak=0;
let selectedTime=0;
let startPrice=0;
let currentSymbol="BTCUSDT";
let profitTotal=0;
let turnover=0;

function connectWallet(){
  connected=true;
  document.getElementById("walletBtn").innerText="Connected ✓";
}

function loadChart(){
  document.getElementById("tv_chart").innerHTML="";
  new TradingView.widget({
    container_id:"tv_chart",
    width:"100%",
    height:350,
    symbol:"BINANCE:"+currentSymbol,
    interval:"1",
    theme:"dark",
    style:"1",
    locale:"en"
  });
}

function changeCoin(){
  currentSymbol=document.getElementById("coinSelect").value;
  loadChart();
}

function selectTime(sec,btn){
  selectedTime=sec;
  document.querySelectorAll(".timer-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

async function getPrice(){
  const res=await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
  const data=await res.json();
  return parseFloat(data.price);
}

async function placeBet(direction){
  if(!connected){ alert("Connect wallet first"); return; }
  const amount=parseFloat(document.getElementById("betAmount").value);
  if(!amount || amount>balance){ alert("Invalid amount"); return; }
  if(selectedTime===0){ alert("Select duration"); return; }

  balance-=amount;
  turnover+=amount;
  updateUI();

  startPrice=await getPrice();
  let timeLeft=selectedTime;

  let timer=setInterval(async()=>{
    timeLeft--;
    document.getElementById("countdown").innerText="Round: "+timeLeft+"s";

    if(timeLeft<=0){
      clearInterval(timer);
      let endPrice=await getPrice();
      let win=false;

      if(direction==="UP" && endPrice>startPrice) win=true;
      if(direction==="DOWN" && endPrice<startPrice) win=true;

      if(win){
        let reward=amount*1.9;
        balance+=reward;
        profitTotal+=reward-amount;
        streak++;
      } else {
        profitTotal-=amount;
        streak=0;
      }

      updateUI();
      updateLeaderboard();
    }
  },1000);
}

function updateUI(){
  document.getElementById("balance").innerText=balance.toFixed(2);
  document.getElementById("streak").innerText=streak;
  document.getElementById("profit").innerText=profitTotal.toFixed(2);
}

function updateLeaderboard(){
  document.getElementById("leaderboard").innerHTML=
    "Turnover: "+turnover.toFixed(2)+" $PILL<br>"+
    "Total Profit: "+profitTotal.toFixed(2)+" $PILL";
}

function aiSignal(){
  const signals=["Bullish","Bearish","Neutral"];
  const rand=signals[Math.floor(Math.random()*3)];
  document.getElementById("aiSignal").innerText=rand;
}

setInterval(aiSignal,4000);

loadChart();
updateUI();

</script>

</body>
</html>
