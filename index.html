<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>BlockOracle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b0f1a;
  color: white;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

select, input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  margin: 10px;
}

button {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}

.yes { background: #16a34a; color: white; }
.no { background: #dc2626; color: white; }
.timer-btn { background: #1f2937; color: white; }

.timer-btn.active {
  background: #f7931a;
  color: black;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 16px;
  margin-top: 30px;
}

.countdown {
  margin-top: 10px;
  font-size: 18px;
  color: #f7931a;
}

footer {
  margin-top: 60px;
  opacity: 0.4;
}
</style>
</head>

<body>
<div class="container">

<h1>🔮 BlockOracle</h1>
<p>Predict short-term price moves using $PILL</p>

<!-- Coin Selector -->
<h2>Select Asset</h2>
<select id="coinSelect" onchange="changeCoin()">
  <option value="BINANCE:BTCUSDT">Bitcoin (BTC)</option>
  <option value="BINANCE:ETHUSDT">Ethereum (ETH)</option>
  <option value="BINANCE:BNBUSDT">BNB</option>
  <option value="BINANCE:SOLUSDT">Solana (SOL)</option>
  <option value="BINANCE:XRPUSDT">XRP</option>
  <option value="BINANCE:ADAUSDT">Cardano (ADA)</option>
  <option value="BINANCE:AVAXUSDT">Avalanche (AVAX)</option>
  <option value="BINANCE:DOGEUSDT">Dogecoin (DOGE)</option>
  <option value="BINANCE:TRXUSDT">TRON (TRX)</option>
  <option value="BINANCE:DOTUSDT">Polkadot (DOT)</option>
</select>

<!-- Chart -->
<div id="tv_chart" style="height:400px;margin-top:20px;"></div>

<div class="card">

<h2>Select Duration</h2>
<div>
  <button class="timer-btn" onclick="selectTime(60)">1m</button>
  <button class="timer-btn" onclick="selectTime(120)">2m</button>
  <button class="timer-btn" onclick="selectTime(180)">3m</button>
  <button class="timer-btn" onclick="selectTime(240)">4m</button>
  <button class="timer-btn" onclick="selectTime(300)">5m</button>
</div>

<div class="countdown" id="countdown">No active round</div>

<h2 style="margin-top:25px;">Bet Amount ($PILL)</h2>
<input type="number" id="betAmount" placeholder="100 $PILL" />

<div>
  <button class="yes" onclick="placeBet('UP')">BET UP</button>
  <button class="no" onclick="placeBet('DOWN')">BET DOWN</button>
</div>

</div>

<footer>
Demo Prediction Interface — $PILL token integration coming soon
</footer>

</div>

<script>

let currentSymbol = "BINANCE:BTCUSDT";
let widget;
let timer;
let timeLeft = 0;

function loadChart(symbol) {
  document.getElementById("tv_chart").innerHTML = "";
  widget = new TradingView.widget({
    container_id: "tv_chart",
    width: "100%",
    height: 400,
    symbol: symbol,
    interval: "1",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "en",
    toolbar_bg: "#0b0f1a",
    enable_publishing: false,
    hide_top_toolbar: false,
    save_image: false
  });
}

function changeCoin() {
  const select = document.getElementById("coinSelect");
  currentSymbol = select.value;
  loadChart(currentSymbol);
}

function selectTime(seconds) {
  clearInterval(timer);
  timeLeft = seconds;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("countdown").innerText =
      "Round ends in: " + timeLeft + "s";

    if (timeLeft <= 0) {
      clearInterval(timer);
      document.getElementById("countdown").innerText =
        "Round finished. Awaiting result...";
    }
  }, 1000);
}

function placeBet(direction) {
  const amount = document.getElementById("betAmount").value;

  if (!amount) {
    alert("Enter bet amount in $PILL");
    return;
  }

  alert(
    "Asset: " + currentSymbol +
    "\nDirection: " + direction +
    "\nAmount: " + amount + " $PILL"
  );
}

loadChart(currentSymbol);

</script>

</body>
</html>
