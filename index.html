<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>BlockOracle Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #0e1322, #050816);
  color: white;
}

/* ===== TOPBAR ===== */

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#0e1322;
}

.wallet-btn {
  background:#f7931a;
  color:black;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* ===== HERO ===== */

.hero {
  height: 45vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.opnet-logo {
  margin-bottom:20px;
  filter: drop-shadow(0 0 25px rgba(247,147,26,0.6));
}

.opnet-logo svg {
  width:140px;
}

.hero h1 {
  font-size:32px;
  margin:10px 0;
}

/* ===== MAIN ===== */

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
  text-align:center;
}

select, input {
  padding:10px;
  border-radius:8px;
  border:none;
  font-size:16px;
  margin:10px;
}

button {
  padding:8px 14px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.yes { background:#16a34a; color:white; }
.no { background:#dc2626; color:white; }
.timer-btn { background:#1f2937; color:white; }
.timer-btn.active { background:#f7931a; color:black; }

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:14px;
  margin-top:20px;
}

footer {
  margin-top:40px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="topbar">
  <strong>BlockOracle Pro</strong>
  <div class="wallet-btn" onclick="connectWallet()" id="walletBtn">
    Connect OP_WALLET
  </div>
</div>

<!-- ===== HERO ZONE ===== -->

<div class="hero">

  <div class="opnet-logo">
    <!-- OP_NET SVG -->
    <svg viewBox="0 0 140 40">
      <circle cx="20" cy="20" r="16" fill="white"/>
      <circle cx="20" cy="20" r="8" fill="#0e1322"/>
      <path d="M45 10 L60 10 C70 10 70 30 60 30 L45 30 Z" fill="#f7931a"/>
      <text x="80" y="26" font-size="20" fill="white"
            font-family="Arial" font-weight="bold">NET</text>
    </svg>
  </div>

  <h1>Prediction Markets on OP_NET</h1>
  <p>Trade short-term price moves using $PILL</p>

</div>

<!-- ===== MAIN CONTENT ===== -->

<div class="container">

<select id="coinSelect" onchange="changeCoin()">
  <option value="BTCUSDT">BTC</option>
  <option value="ETHUSDT">ETH</option>
  <option value="BNBUSDT">BNB</option>
  <option value="SOLUSDT">SOL</option>
</select>

<div id="tv_chart" style="height:350px;margin-top:20px;"></div>

<div class="card">
<h3>Select Duration</h3>
<button class="timer-btn" onclick="selectTime(60,this)">1m</button>
<button class="timer-btn" onclick="selectTime(120,this)">2m</button>

<h3>Bet Amount ($PILL)</h3>
<input type="number" id="betAmount" placeholder="100">

<br>
<button class="yes" onclick="placeBet('UP')">UP</button>
<button class="no" onclick="placeBet('DOWN')">DOWN</button>

<div id="countdown"></div>
</div>

<footer>
Powered by OP_NET
</footer>

</div>

<script>

let connected=false;
let selectedTime=0;
let currentSymbol="BTCUSDT";

function connectWallet(){
  connected=true;
  document.getElementById("walletBtn").innerText="Connected ✓";
}

function loadChart(){
  document.getElementById("tv_chart").innerHTML="";
  new TradingView.widget({
    container_id:"tv_chart",
    width:"100%",
    height:350,
    symbol:"BINANCE:"+currentSymbol,
    interval:"1",
    theme:"dark",
    style:"1",
    locale:"en"
  });
}

function changeCoin(){
  currentSymbol=document.getElementById("coinSelect").value;
  loadChart();
}

function selectTime(sec,btn){
  selectedTime=sec;
  document.querySelectorAll(".timer-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function placeBet(direction){
  if(!connected){ alert("Connect wallet first"); return; }
  if(selectedTime===0){ alert("Select duration"); return; }
  alert("Bet placed: "+direction);
}

loadChart();

</script>

</body>
</html>
